name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup environment
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk python3-pip zip unzip git autoconf libtool automake pkg-config libltdl-dev libffi-dev
        pip install buildozer
    
    - name: Build APK
      run: |
        buildozer init
        sed -i 's/title = .*/title = MARVARID market/' buildozer.spec
        sed -i 's/package.name = .*/package.name = marvaridmarket/' buildozer.spec
        sed -i 's/package.domain = .*/package.domain = uz.marvarid/' buildozer.spec
        sed -i 's/source.include_exts = .*/source.include_exts = py,png,jpg,kv,atlas,ttf,db/' buildozer.spec
        sed -i 's/requirements = .*/requirements = python3,kivy,kivymd/' buildozer.spec
        sed -i 's/android.api = .*/android.api = 33/' buildozer.spec
        sed -i 's/android.minapi = .*/android.minapi = 24/' buildozer.spec
        sed -i 's/android.arch = .*/android.arch = arm64-v8a/' buildozer.spec
        buildozer -v android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: MARVARID-APK
        path: bin/*.apk